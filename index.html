    function getDateRange(preset) {
      const today = new Date();
      const y = today.getFullYear();
      const m = today.getMonth(); // 0-indexed
      // toISOString() はUTC変換されるためタイムゾーンがずれる。ローカル時間でフォーマット
      const fmt = d => {
        const yy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yy}-${mm}-${dd}`;
      };
      if (preset === 'thisMonth') return { from: fmt(new Date(y, m, 1)), to: fmt(new Date(y, m + 1, 0)) };
      if (preset === 'lastMonth') return { from: fmt(new Date(y, m - 1, 1)), to: fmt(new Date(y, m, 0)) };
      const fyStart = m >= 3 ? y : y - 1; // 4月始まり
      if (preset === 'thisFiscal') return { from: fmt(new Date(fyStart, 3, 1)), to: fmt(new Date(fyStart + 1, 2, 31)) };
      if (preset === 'lastFiscal') return { from: fmt(new Date(fyStart - 1, 3, 1)), to: fmt(new Date(fyStart, 2, 31)) };
      return { from: '', to: '' };
    }

          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message))).setCaseStatusAdmin(caseId, status);
        });
      },
      updateCaseDataAdmin: (caseId, payload) => {
        if (IS_LOCAL) {
          return new Promise(resolve => setTimeout(() => {
            const casePatch = payload?.casePatch || {};
            const recordPatch = payload?.recordPatch || {};
            mockCases = mockCases.map(c => {
              if (c.id !== caseId) return c;
              const staff = recordPatch.staffEmail
                ? mockStaffMembers.find(x => x.email === String(recordPatch.staffEmail).toLowerCase())
                : null;
              return {
                ...c,
                ...casePatch,
                ...recordPatch,
                staffEmail: Object.prototype.hasOwnProperty.call(recordPatch, 'staffEmail') ? (staff?.email || '') : c.staffEmail,
                staffName: Object.prototype.hasOwnProperty.call(recordPatch, 'staffEmail') ? (staff?.name || '') : c.staffName
              };
            });
            resolve();
          }, 300));
        }
        return new Promise((resolve, reject) => {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message))).updateCaseDataAdmin(caseId, payload);
        });
      },
      addManualCase: (payload) => {
        if (IS_LOCAL) {
          return new Promise(resolve => setTimeout(() => {
            var pk = 'manual_' + Date.now();
            var newCase = {
              id: pk, timestamp: pk,
              email: payload.email,
              officeName: payload.officeName,
              requesterName: payload.requesterName,
              details: payload.details,
              serviceType: payload.serviceType || '',
              prefecture: payload.prefecture || null,
              status: 'unhandled',
              staffEmail: null, staffName: null,
              scheduledDateTime: null, supportCount: 1,
              method: null, businessType: null,
              content: null, remarks: null,
              eventId: null, meetUrl: null,
              currentFiscalYearCount: 0,
              subStaff: [],
              supportHistory: [], attachments: [], emails: []
            };
            mockCases = [newCase, ...mockCases];
            resolve({ pk: pk });
          }, 300));
        }
        return new Promise((resolve, reject) => {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message))).addManualCase(payload);
        });
      },
      updateSubStaff: (caseId, subStaffArray) => {
        if (IS_LOCAL) {
          return new Promise(resolve => setTimeout(() => {
            mockCases = mockCases.map(c => c.id === caseId ? { ...c, subStaff: subStaffArray } : c);
            resolve({ subStaff: subStaffArray });
          }, 300));
        }
        return new Promise((resolve, reject) => {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(e => reject(new Error(e.message))).updateSubStaff(caseId, subStaffArray);
        });
      }
    };

    // ======================================================================
    // 4. Dialog Components (alert/confirm の代替)
    // ======================================================================

    // --- トースト通知 (alert の代替) ---
    function Toast({ toasts, onDismiss }) {
      return (
        <div className="fixed top-4 right-4 z-[200] space-y-2 pointer-events-none" style={{ maxWidth: '420px' }}>
          {toasts.map(t => (
            <div key={t.id}
              className={`pointer-events-auto p-4 rounded-2xl shadow-xl border flex items-start gap-3 toast-enter ${
                t.type === 'error' ? 'bg-rose-50 border-rose-200 text-rose-800' :
                t.type === 'warning' ? 'bg-amber-50 border-amber-200 text-amber-800' :
                t.type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-800' :
                'bg-white border-slate-200 text-slate-800'
              }`}>
              <div className="shrink-0 mt-0.5">
                {t.type === 'error' ? <X size={18} className="text-rose-500"/> :
                 t.type === 'warning' ? <AlertTriangle size={18} className="text-amber-500"/> :
                 t.type === 'success' ? <CheckCircle2 size={18} className="text-emerald-500"/> :
                 <Info size={18} className="text-sky-500"/>}
              </div>
              <div className="flex-1 min-w-0">
                {t.title && <p className="text-sm font-black mb-0.5">{t.title}</p>}
                <p className="text-xs font-bold leading-relaxed whitespace-pre-wrap">{t.message}</p>
              </div>
              <button onClick={() => onDismiss(t.id)} className="shrink-0 p-1 rounded-lg hover:bg-black/5 transition-colors">
                <X size={14} className="opacity-40"/>
              </button>
            </div>
          ))}
        </div>
      );
    }

    // --- 確認ダイアログ (confirm の代替) ---
    function ConfirmDialog({ dialog, onClose }) {
      if (!dialog) return null;
      return (
        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[200] p-4 animate-in fade-in">
          <div className="bg-white w-full max-w-sm rounded-2xl p-6 shadow-2xl animate-in zoom-in duration-200">
            {dialog.title && <h3 className="font-black text-base text-slate-800 mb-2">{dialog.title}</h3>}
            <p className="text-sm text-slate-600 leading-relaxed whitespace-pre-wrap mb-6">{dialog.message}</p>
            <div className="flex gap-2">
              <button
                onClick={() => { onClose(); dialog.onCancel && dialog.onCancel(); }}
                className="flex-1 py-3 rounded-xl text-sm font-black border-2 border-slate-200 text-slate-500 hover:bg-slate-50 transition-all">
                キャンセル
              </button>
              <button
                onClick={() => { onClose(); dialog.onConfirm(); }}
                className={`flex-1 py-3 rounded-xl text-sm font-black text-white transition-all ${
                  dialog.variant === 'danger' ? 'bg-rose-500 hover:bg-rose-600' : 'bg-teal-500 hover:bg-teal-600'
                }`}>
                {dialog.confirmLabel || '確認'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ======================================================================

    function App() {

      const [adminReassignEmail, setAdminReassignEmail] = useState('');

      const [adminCaseEditDraft, setAdminCaseEditDraft] = useState({});
      const [inlineEditField, setInlineEditField] = useState(null); // 'status' | 'staff' | 'caseLimit' | 'annualLimit' | null
      const [staffDropdownSearch, setStaffDropdownSearch] = useState('');

      const [filterPrefWord, setFilterPrefWord] = useState('');
      const [filterPrefOpen, setFilterPrefOpen] = useState(false);
      const [inlineLimitDraft, setInlineLimitDraft] = useState('');

      // Dialog state
      const [toasts, setToasts] = useState([]);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const toastIdRef = useRef(0);

      const showToast = useCallback((message, options = {}) => {
        const id = ++toastIdRef.current;
        setToasts(prev => [...prev, { id, message, type: options.type || 'info', title: options.title || null }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), options.duration || 5000);
      }, []);

      const dismissToast = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, []);

      const showConfirm = useCallback((message, onConfirm, options = {}) => {
        setConfirmDialog({ message, onConfirm, title: options.title, confirmLabel: options.confirmLabel, variant: options.variant, onCancel: options.onCancel });
      }, []);

      useEffect(() => {
        if (!user?.isAdmin && isAdminMode) {
          setIsAdminMode(false);
        }
      }, [user, isAdminMode]);

      const refreshAdminPanelData = useCallback(async () => {
        if (!user?.isAdmin) return;
        setAdminPanelLoading(true);
        try {
          const data = await Api.getAdminPanelData();
          setAdminPanelData(data);
          setSettingsDraft(data?.settings || {});
        } catch (e) {
          showToast(e.message || String(e), { type: 'error', title: '管理データ取得エラー' });
        } finally {
          setAdminPanelLoading(false);
        }
      }, [showToast, user]);

      useEffect(() => {
        if (!isAdminMode) return;
        refreshAdminPanelData();
      }, [isAdminMode, refreshAdminPanelData]);

      useEffect(() => {
        // doGet() が埋め込んだ初期データがあれば即使用（GAS往復を1回削減）
        if (!IS_LOCAL && window.__INITIAL_DATA__) {
          var data = window.__INITIAL_DATA__;
          delete window.__INITIAL_DATA__;
          setUser(data.user);
          setCases(data.cases);
          setMasters(data.masters);
          setLoading(false);
          return;
        }
        Api.getInitialData()
          .then(data => {
            setUser(data.user);
            setCases(data.cases);
            setMasters(data.masters);
            setLoading(false);
          })
          .catch(err => {
            setAuthError(err.message || "データの読み込みに失敗しました");
            setLoading(false);
          });
      }, []);

      const hasActiveSearch = searchWord.trim() !== ''
        || searchDateFrom !== ''
        || searchDateTo !== ''
        || searchPrefecture !== ''
        || searchServiceType !== ''
        || searchAssigned !== 'all'
        || searchStaffEmail !== ''
        || searchTool !== ''
        || searchSortOrder !== 'newest';
      const clearSearch = useCallback(() => {
        setSearchWord('');
        setSearchDateFrom('');
        setSearchDateTo('');
        setSearchPrefecture('');
        setSearchServiceType('');
        setSearchAssigned('all');
        setSearchStaffEmail('');
        setSearchTool('');
        setSearchSortOrder('newest');
      }, []);

      const filteredCases = useMemo(() => {
        if (!user) return [];
        return cases.filter(c => {
          if (activeTab !== 'all' && c.status !== activeTab) return false;
          // 全てタブ: キャンセル済みは除外（キャンセルタブでのみ表示）
          if (activeTab === 'all' && c.status === 'cancelled') return false;
          // 全てタブ: unhandled は全員共有、それ以外は自分の案件のみ（ダッシュボードは全件）
          var isMyCase = c.staffEmail === user.email || (Array.isArray(c.subStaff) && c.subStaff.some(function(s) { return s.email === user.email; }));
          if (activeTab === 'all' && c.status !== 'unhandled' && !isDashboardMode && !isMyCase) return false;
          if (activeTab !== 'all' && activeTab !== 'unhandled' && activeTab !== 'cancelled' && !isDashboardMode && !isMyCase) return false;
          // キーワード検索
          if (searchWord.trim()) {
            var kw = searchWord.trim().toLowerCase();
            var subStaffNames = Array.isArray(c.subStaff) ? c.subStaff.map(function(s) { return s.name; }).join(' ') : '';
            var haystack = [c.officeName, c.requesterName, c.email, c.details, c.serviceType, c.prefecture, c.staffName, subStaffNames].filter(Boolean).join(' ').toLowerCase();
            if (haystack.indexOf(kw) === -1) return false;
          }
          // 期間検索
          if (searchDateFrom) {
            var from = new Date(searchDateFrom); from.setHours(0,0,0,0);
            if (new Date(c.timestamp) < from) return false;
          }
          if (searchDateTo) {
            var to = new Date(searchDateTo); to.setHours(23,59,59,999);
            if (new Date(c.timestamp) > to) return false;
          }
          if (searchPrefecture && c.prefecture !== searchPrefecture) return false;
          if (searchServiceType && c.serviceType !== searchServiceType) return false;
          if (searchAssigned === 'assigned' && !c.staffEmail) return false;
          if (searchAssigned === 'unassigned' && c.staffEmail) return false;
          if (searchStaffEmail && isDashboardMode && c.staffEmail !== searchStaffEmail) return false;
          if (searchTool && !(Array.isArray(c.tools) && c.tools.includes(searchTool))) return false;
          return true;
        }).sort((a, b) => {
          // 完了案件は実施日（scheduledDateTime）優先、なければ受付日（timestamp）
          var da = (a.status === 'completed' && a.scheduledDateTime) ? a.scheduledDateTime : a.timestamp;
          var db = (b.status === 'completed' && b.scheduledDateTime) ? b.scheduledDateTime : b.timestamp;
          return searchSortOrder === 'oldest'
            ? new Date(da) - new Date(db)
            : new Date(db) - new Date(da);
        });
      }, [
        cases,
        activeTab,
        isDashboardMode,
        user,
        searchWord,
        searchDateFrom,
        searchDateTo,
        searchPrefecture,
        searchServiceType,
        searchAssigned,
        searchStaffEmail,
        searchSortOrder,
        searchTool
      ]);

      const selectedCase = useMemo(() => cases.find(c => c.id === selectedCaseId) || null, [cases, selectedCaseId]);
      const isReadOnlyMode = isDashboardMode && !isAdminMode;
      const activeStaffMembers = useMemo(() => {
        const base = adminPanelData?.staffMembers || masters?.allStaff || [];
        return base.filter(s => s && s.email && (s.isActive === undefined || s.isActive));
      }, [adminPanelData, masters]);

      // 詳細フィルタのアクティブ数（バッジ表示用）
      const advancedFilterCount = useMemo(() => [
        searchDateFrom || searchDateTo,
        searchPrefecture,
        searchServiceType,
        searchAssigned !== 'all',
        searchStaffEmail,
        searchSortOrder !== 'newest',
        searchTool,
      ].filter(Boolean).length, [searchDateFrom, searchDateTo, searchPrefecture, searchServiceType, searchAssigned, searchStaffEmail, searchSortOrder, searchTool]);

      // 有効な上限値（案件特例 → 全体設定 → ハードコードデフォルト の優先順）
      const effectiveCaseLimit = selectedCase?.caseLimitOverride || masters?.limits?.caseSupport || 3;
      const effectiveAnnualLimit = selectedCase?.annualLimitOverride || masters?.limits?.annual || 10;

      // ツール月間上限: 当月の使用件数を全案件から集計
      const toolMonthlyLimits = masters?.toolMonthlyLimits || {};
      const toolMonthlyUsage = useMemo(() => {
        const limitedTools = Object.keys(toolMonthlyLimits);
        if (!limitedTools.length) return {};
        const now = new Date();
        const thisMonth = now.getFullYear() * 100 + (now.getMonth() + 1); // YYYYMM
        const counts = {};
        limitedTools.forEach(t => { counts[t] = 0; });
        cases.forEach(c => {
          if (c.status !== 'inProgress' && c.status !== 'completed') return;
          if (!Array.isArray(c.tools) || !c.tools.length) return;
          // 日付から月を判定（scheduledDateTime優先、なければtimestamp）
          var dateStr = c.scheduledDateTime || c.timestamp;
          if (!dateStr) return;
          var d = new Date(dateStr);
          var caseMonth = d.getFullYear() * 100 + (d.getMonth() + 1);
          if (caseMonth !== thisMonth) return;
          limitedTools.forEach(t => {
            if (c.tools.includes(t)) counts[t]++;
          });
        });
        return counts;
      }, [cases, toolMonthlyLimits]);

      // タブごとのケース一覧（新着バッジ計算・seenIds更新用。検索フィルタ非適用）
      const getTabCases = useCallback((tabKey) => {
        return cases.filter(c => {
          if (tabKey !== 'all' && c.status !== tabKey) return false;
          if (tabKey === 'all' && c.status === 'cancelled') return false; // 全てタブ: キャンセル除外
          if (tabKey === 'unhandled') return true; // 未対応は全員共有
          if (tabKey === 'all' && c.status === 'unhandled') return true; // 全てタブ: unhandledは全員共有
          if (tabKey === 'cancelled') return true; // キャンセルは全員共有（管理者が確認できるよう）
          if (isDashboardMode) return true; // 閲覧・管理モードは全件
          return c.staffEmail === user?.email; // 通常モードは自分の案件のみ
        });
      }, [cases, isDashboardMode, user?.email]);

      // 全タブのカウント + 新着件数を1パスで計算
      const { tabCounts, newCaseCounts } = useMemo(() => {
        var counts = {};
        var newCounts = {};
        var checkNew = showNewBadge && !(isDashboardMode && !isAdminMode);
        STATUS_KEYS.forEach(k => { counts[k] = 0; newCounts[k] = 0; });
        var seenSets = {};
        if (checkNew) {
          STATUS_KEYS.forEach(k => { seenSets[k] = new Set(seenCaseIds[k] || []); });
        }
        var userEmail = user?.email;
        cases.forEach(c => {
          STATUS_KEYS.forEach(tabKey => {
            if (tabKey !== 'all' && c.status !== tabKey) return;
            if (tabKey === 'all' && c.status === 'cancelled') return;
            if (tabKey === 'unhandled' || (tabKey === 'all' && c.status === 'unhandled') || tabKey === 'cancelled') { /* 全員共有 */ }
            else if (!isDashboardMode && c.staffEmail !== userEmail) return;
            counts[tabKey]++;
            if (checkNew && seenSets[tabKey] && !seenSets[tabKey].has(c.id)) newCounts[tabKey]++;
          });
        });
        return { tabCounts: counts, newCaseCounts: newCounts };
      }, [cases, seenCaseIds, showNewBadge, isDashboardMode, isAdminMode, user?.email]);

      // 担当者ドロップダウン内の検索フィルタ
      const filteredStaffForDropdown = useMemo(() => {
        if (!staffDropdownSearch.trim()) return activeStaffMembers;

      // アクティブフィルターチップ（個別削除可能なピル）

        searchServiceType ? { id: 'service', label: searchServiceType, clear: () => setSearchServiceType('') } : null,
        searchAssigned !== 'all' ? { id: 'assigned', label: searchAssigned === 'assigned' ? '担当あり' : '未割当', clear: () => setSearchAssigned('all') } : null,
        searchStaffEmail ? { id: 'staff', label: activeStaffMembers.find(s => s.email === searchStaffEmail)?.name || searchStaffEmail, clear: () => setSearchStaffEmail('') } : null,

      useEffect(() => {

      useEffect(() => {

      }, [inlineEditField]);

      useEffect(() => {
        if (!selectedCase) return;
        setAdminReassignEmail(selectedCase.staffEmail || '');
        setAdminStatusValue(selectedCase.status || 'unhandled');
        setAdminCaseEditDraft({
          status: selectedCase.status || 'unhandled',
          staffEmail: selectedCase.staffEmail || '',
          officeName: selectedCase.officeName || '',
          requesterName: selectedCase.requesterName || '',
          email: selectedCase.email || '',
          details: selectedCase.details || '',
          prefecture: selectedCase.prefecture || '',
          serviceType: selectedCase.serviceType || '',
          supportCount: String(selectedCase.supportCount || 1),
          caseLimitOverride: selectedCase.caseLimitOverride === undefined || selectedCase.caseLimitOverride === null ? '' : String(selectedCase.caseLimitOverride),
          annualLimitOverride: selectedCase.annualLimitOverride === undefined || selectedCase.annualLimitOverride === null ? '' : String(selectedCase.annualLimitOverride),
          scheduledDate: (() => {
            if (!selectedCase.scheduledDateTime) return '';
            var d = new Date(selectedCase.scheduledDateTime);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
          })(),
          scheduledTime: (() => {
            if (!selectedCase.scheduledDateTime) return '';
            var d = new Date(selectedCase.scheduledDateTime);
            return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
          })(),
          method: selectedCase.method || '',
          content: selectedCase.content || '',
          remarks: selectedCase.remarks || '',
          tools: Array.isArray(selectedCase.tools) ? selectedCase.tools : []
        });
      }, [selectedCase]);

      // 案件切り替え時にスレッドを読み込み（selectedCaseId のみに依存）
      useEffect(() => {
        setExpandedEmailIdx(null);
        setOpenThreadId(null);
        setThreadGroups([]);
        if (!selectedCaseId) return;
        // selectedCase はレンダー時に最新値が取れるので ref 不要で直接参照
        if (selectedCase && selectedCase.status === 'unhandled') return;

        const remaining = Math.max(0, limit - used);
        return `${used}/${limit}件`;
      }, [toolMonthlyLimits, toolMonthlyUsage]);

      // ツール選択UIレンダラー（共通）
      const renderToolSelector = useCallback((selectedTools, onToggle, allowAdminOverride) => {

            <div className="flex flex-wrap gap-2">

      const replaceCaseTags = (str) => {

      const toBase64Payload = useCallback((file) => {
        return new Promise((resolve, reject) => {
          var reader = new FileReader();
          reader.onload = function() {
            var result = String(reader.result || '');
            var comma = result.indexOf(',');
            var base64 = comma >= 0 ? result.substring(comma + 1) : result;
            resolve({
              name: file.name,
              mimeType: file.type || 'application/octet-stream',
              size: file.size || 0,
              base64Data: base64
            });
          };
          reader.onerror = function() { reject(new Error('ファイルの読み込みに失敗しました: ' + file.name)); };
          reader.readAsDataURL(file);
        });

      const handleSendEmail = async () => {
        if (!emailModal || !user) return;

          var result;
          var patch = {};
          if (emailModal.mode === 'initial') {
            var emailTools = (emailModal.tools && emailModal.tools.length > 0) ? emailModal.tools : undefined;
            result = await Api.assignAndSendEmail(emailModal.caseId, user, emailModal.subject, emailModal.body, trimmedCc, trimmedBcc, emailTools);
            patch = { status: 'inProgress', staffEmail: user.email, staffName: user.name };
            if (emailTools) patch.tools = emailTools;

          } else {
            result = await Api.sendCaseEmail(emailModal.caseId, user, emailModal.subject, emailModal.body, emailModal.threadId, trimmedCc, trimmedBcc);
          }
          var caseId = emailModal.caseId;
          setCases(prev => {
            var updated = prev.map(c => {
              if (c.id !== caseId) return c;
              var p = { ...patch };
              if (result?.threadId && !(c.threadIds || []).includes(result.threadId)) {
                p.threadIds = [...(c.threadIds || []), result.threadId];
              }
              return { ...c, ...p };

            return recalcFiscalYearCounts(updated, caseId);

          setEmailModal(null);
          if (emailModal.mode === 'initial') {
            setActiveTab('inProgress');
            showToast('メールを送信し、担当に設定しました。', { type: 'success', title: '担当設定完了' });

      const handleEditSave = async (ev) => {

            var total = (existingAttachments?.length || 0) + (pendingFiles?.length || 0);

              throw new Error('添付ファイルは1回の報告につき最大5件です。');
            }
            if ((pendingFiles?.length || 0) > 0 && !masters?.attachmentFolderConfigured) {

            payload.keepAttachmentIds = (existingAttachments || []).map(a => a.fileId).filter(Boolean);

          showToast('担当者を変更しました。', { type: 'success', title: '管理者操作' });
        } catch (e) {
          showToast(e.message || String(e), { type: 'error', title: '担当者変更エラー' });
        } finally {
          setSubmitting(false);
        }
      };

      const handleAdminCaseEditSave = async () => {
        if (!selectedCase) return;
        const payload = {
          casePatch: {
            officeName: adminCaseEditDraft.officeName,
            requesterName: adminCaseEditDraft.requesterName,
            email: adminCaseEditDraft.email,
            details: adminCaseEditDraft.details,
            prefecture: adminCaseEditDraft.prefecture,
            serviceType: adminCaseEditDraft.serviceType
          },
          recordPatch: {
            status: adminCaseEditDraft.status,
            staffEmail: adminCaseEditDraft.staffEmail,
            scheduledDateTime: adminCaseEditDraft.scheduledDate ? (adminCaseEditDraft.scheduledDate + (adminCaseEditDraft.scheduledTime ? 'T' + adminCaseEditDraft.scheduledTime : '')) : null,
            method: adminCaseEditDraft.method || null,
            supportCount: Number(adminCaseEditDraft.supportCount || 1),
            caseLimitOverride: adminCaseEditDraft.caseLimitOverride === '' ? null : Number(adminCaseEditDraft.caseLimitOverride),
            annualLimitOverride: adminCaseEditDraft.annualLimitOverride === '' ? null : Number(adminCaseEditDraft.annualLimitOverride),
            content: adminCaseEditDraft.content,
            remarks: adminCaseEditDraft.remarks,
            tools: adminCaseEditDraft.tools || []
          }
        };
        setSubmitting(true);
        try {
          await Api.updateCaseDataAdmin(selectedCase.timestamp, payload);
          var editAdminCaseId = selectedCase.id;
          var editStaff = payload.recordPatch?.staffEmail
            ? activeStaffMembers.find(s => s.email === payload.recordPatch.staffEmail)
            : null;
          setCases(prev => {
            var updated = prev.map(c => {
              if (c.id !== editAdminCaseId) return c;
              var p = { ...payload.casePatch, ...payload.recordPatch };
              if (editStaff) p.staffName = editStaff.name;
              return { ...c, ...p };
            });
            return recalcFiscalYearCounts(updated, editAdminCaseId);
          });
          showToast('案件データを更新しました。', { type: 'success', title: '管理者操作' });
        } catch (e) {
          showToast(e.message || String(e), { type: 'error', title: '案件更新エラー' });
        } finally {
          setSubmitting(false);
        }
      };

      const getRoleStatusValue = useCallback((staff) => {
        if (!staff?.isActive) return 'disabled';
        return staff.role === 'admin' ? 'admin' : 'staff';
      }, []);

      const handleRoleStatusChange = async (staff, nextStatus) => {
        if (!staff || !staff.email) return;
        if (staff.email === user?.email) return;
        const current = getRoleStatusValue(staff);
        if (current === nextStatus) return;
        setSubmitting(true);
        try {
          if (nextStatus === 'disabled') {
            await Api.deactivateStaffMember(staff.email);
          } else {
            await Api.upsertStaffMember({ email: staff.email, role: nextStatus });
          }
          await refreshAdminPanelData();
          showToast('権限を更新しました。', { type: 'success', title: '権限管理' });
        } catch (e) {
          showToast(e.message || String(e), { type: 'error', title: '権限更新エラー' });
        } finally {
          setSubmitting(false);
        }
      };

      const handleSaveSettings = async () => {
        if (!adminPanelData?.settings) return;
        const patch = {};
        Object.keys(settingsDraft || {}).forEach(k => {
          if (String(settingsDraft[k] ?? '') !== String(adminPanelData.settings[k] ?? '')) patch[k] = settingsDraft[k];
        });
        if (!Object.keys(patch).length) {
          showToast('変更はありません。', { type: 'info', title: '設定管理' });
          return;
        }
        setSubmitting(true);
        try {
          await Api.updateSettingsAdmin(patch);
          await refreshAdminPanelData();
          const refreshed = await Api.getInitialData();
          setMasters(refreshed.masters);
          showToast('設定を保存しました。', { type: 'success', title: '設定管理' });
        } catch (e) {
          showToast(e.message || String(e), { type: 'error', title: '設定更新エラー' });
        } finally {
          setSubmitting(false);
        }
      };

      const roleMembers = useMemo(() => {
        const list = adminPanelData?.staffMembers || [];
        const keyword = roleSearchWord.trim().toLowerCase();
        return list.filter(staff => {
          const status = getRoleStatusValue(staff);
          if (roleStatusFilter !== 'all' && status !== roleStatusFilter) return false;
          if (!keyword) return true;
          return [staff.name, staff.email].filter(Boolean).join(' ').toLowerCase().includes(keyword);
        });
      }, [adminPanelData, roleSearchWord, roleStatusFilter, getRoleStatusValue]);

      const settingsMeta = useMemo(() => ({
        ANNUAL_USAGE_LIMIT: { label: '年度利用回数上限', category: 'limits', desc: '1ユーザーの年度内対応上限' },
        CASE_USAGE_LIMIT: { label: '案件ごとの対応上限', category: 'limits', desc: '1案件あたりの対応上限' },
        MAIL_FORCE_CC: { label: '通常CCメールアドレス（任意）', category: 'mail', desc: '通常のCCとして追加されます（未設定可）' },
        MAIL_INITIAL_SUBJECT: { label: '初回メール件名', category: 'mail', desc: '案件の初回送信時に使用' },
        MAIL_INITIAL_BODY: { label: '初回メール本文', category: 'mail', desc: 'テンプレート本文（タグ利用可）' },
        MAIL_INITIAL_INCLUDE_DETAILS: { label: '初回メールに相談内容を含める', category: 'mail', desc: 'OFFにすると相談内容ブロック（セパレータ含む）を省略します', type: 'boolean' },
        MAIL_NEW_BODY: { label: '新規メール本文テンプレート', category: 'mail', desc: '「新規メール送信」時の初期本文。使用可能タグ: {{名前}} {{事業所名}} {{担当者名}}' },
        MAIL_DECLINED_SUBJECT: { label: '回数超過メール件名', category: 'mail', desc: '回数超過時に使用' },
        MAIL_DECLINED_BODY: { label: '回数超過メール本文', category: 'mail', desc: '回数超過時のテンプレート本文' },
        SHARED_CALENDAR_ID: { label: '共有カレンダーID', category: 'integration', desc: '予定作成に使用' },
        ATTACHMENT_FOLDER_ID: { label: '添付保存先フォルダID', category: 'integration', desc: '添付ファイル保存先' },
        ZOOM_ACCOUNT_ID: { label: 'Zoom Account ID', category: 'integration', desc: 'Zoom連携情報' },
        ZOOM_CLIENT_ID: { label: 'Zoom Client ID', category: 'integration', desc: 'Zoom連携情報' },
        ZOOM_CLIENT_SECRET: { label: 'Zoom Client Secret', category: 'integration', desc: 'Zoom連携情報' },
        SUPPORT_TOOLS: { label: '対応ツール一覧', category: 'tools', type: 'tools', desc: 'フォームの「対応ツール」選択肢を管理します。追加・編集・削除・並び替えができます。' },
        TOOL_MONTHLY_LIMITS: { label: 'ツール月間上限', category: 'tools', desc: '月間件数上限を設定するツール。形式: ツール名:上限 （例: ケアプランデータ連携システム:30）。カンマ区切りで複数指定可。' }
      }), []);

      const visibleSettingCategories = useMemo(() => {
        const byCategory = { limits: 0, mail: 0, integration: 0, tools: 0, other: 0 };
        Object.keys(settingsDraft || {}).forEach(k => {
          const category = settingsMeta[k]?.category || 'other';
          byCategory[category] = (byCategory[category] || 0) + 1;
        });
        return Object.keys(byCategory).filter(c => byCategory[c] > 0);
      }, [settingsDraft, settingsMeta]);

      useEffect(() => {
        if (!visibleSettingCategories.length) return;
        if (!visibleSettingCategories.includes(settingsTab)) setSettingsTab(visibleSettingCategories[0]);
      }, [settingsTab, visibleSettingCategories]);

      if (loading) return <div className="h-screen flex items-center justify-center bg-slate-50"><Loader2 className="animate-spin text-teal-600 w-8 h-8"/></div>;
      if (authError) return <div className="h-screen flex items-center justify-center bg-rose-50 text-rose-600 font-bold p-10">{authError}</div>;

      return (
        <div className="h-screen flex flex-col bg-slate-50 text-slate-900 font-sans overflow-hidden relative">
          {/* Toast Notifications */}
          <Toast toasts={toasts} onDismiss={dismissToast} />
          {/* Confirm Dialog */}
          <ConfirmDialog dialog={confirmDialog} onClose={() => setConfirmDialog(null)} />

          {/* Header */}
          <header className="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-3 sm:px-4 lg:px-6 shrink-0 z-20 shadow-sm">
            <div className="flex items-center gap-3">
              <div className="bg-teal-600 text-white p-1.5 rounded-lg"><Activity size={18} /></div>
              <span className="font-black text-base tracking-tighter hidden sm:inline">タダサポ管理</span>
            </div>
            <div className="flex items-center gap-3">
              <div className="text-right hidden sm:block">
                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">ログイン中</p>
                <p className="text-xs font-bold text-slate-700">{user?.name}</p>
              </div>
              <div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center border-2 border-white shadow-sm">
                <UserIcon size={16} className="text-slate-400" />
              </div>
            </div>
          </header>
          <div className="px-3 sm:px-4 lg:px-6 py-2 bg-white border-b border-slate-100">
            <div className="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between" role="toolbar" aria-label="表示モード切替">
              <div className="flex items-center gap-2">
                <span className="text-[10px] font-black text-slate-500">表示</span>
                <div className="flex items-center rounded-xl border border-slate-200 bg-slate-50 p-1" role="group" aria-label="表示モード">
                  <button
                    type="button"
                    aria-pressed={!isDashboardMode && !isAdminMode}
                    onClick={() => {
                      setIsDashboardMode(false);
                      setIsAdminMode(false);
                      setSelectedCaseId(null);
                    }}
                    className={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-colors ${
                      !isDashboardMode && !isAdminMode ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-slate-100'
                    }`}
                  >
                    通常
                  </button>
                  <button
                    type="button"
                    aria-pressed={isDashboardMode && !isAdminMode}
                    onClick={() => {
                      setIsDashboardMode(true);
                      setIsAdminMode(false);
                      setSelectedCaseId(null);
                    }}
                    className={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-colors ${
                      isDashboardMode && !isAdminMode ? 'bg-white text-slate-900 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-slate-100'
                    }`}
                  >
                    閲覧
                  </button>
                  {user?.isAdmin && (
                    <button
                      type="button"
                      aria-pressed={isAdminMode}
                      onClick={() => {
                        setIsDashboardMode(true);
                        setIsAdminMode(true);
                        setSelectedCaseId(null);
                      }}
                      className={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-colors ${
                        isAdminMode ? 'bg-amber-500 text-white' : 'text-amber-700 hover:bg-amber-100'
                      }`}
                    >
                      管理
                    </button>
                  )}
                </div>
              </div>
              {user?.isAdmin && isAdminMode && (
                <div className="flex items-center gap-2">
                  <button
                    type="button"
                    onClick={() => setAddCaseDialogOpen(true)}
                    className="px-3 py-1.5 rounded-lg text-[10px] font-black bg-teal-50 text-teal-700 hover:bg-teal-100 border border-teal-200 flex items-center gap-1.5"
                  >
                    <Plus size={12} /> 新規案件
                  </button>
                  <button
                    type="button"
                    onClick={() => setAdminRoleDialogOpen(true)}
                    className="px-3 py-1.5 rounded-lg text-[10px] font-black bg-amber-50 text-amber-700 hover:bg-amber-100 border border-amber-200 flex items-center gap-1.5"
                  >
                    <Shield size={12} /> 権限管理
                  </button>
                  <button
                    type="button"
                    onClick={() => setAdminSettingsDialogOpen(true)}
                    className="px-3 py-1.5 rounded-lg text-[10px] font-black bg-sky-50 text-sky-700 hover:bg-sky-100 border border-sky-200 flex items-center gap-1.5"
                  >
                    <Settings2 size={12} /> 設定管理
                  </button>
                  <button
                    type="button"
                    onClick={() => setExtractDialogOpen(true)}
                    className="px-3 py-1.5 rounded-lg text-[10px] font-black bg-violet-50 text-violet-700 hover:bg-violet-100 border border-violet-200 flex items-center gap-1.5"
                  >
                    <ClipboardList size={12} /> データ抽出
                  </button>
                  {masters?.spreadsheetUrl && (
                    <a
                      href={masters.spreadsheetUrl}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="px-3 py-1.5 rounded-lg text-[10px] font-black bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200 flex items-center gap-1.5"
                    >
                      <ExternalLink size={12} /> DBを開く
                    </a>
                  )}
                  {/* 新着通知トグル */}
                  <button
                    type="button"
                    title={showNewBadge ? '新着バッジを非表示にする' : '新着バッジを表示する'}
                    onClick={() => {
                      const next = !showNewBadge;
                      setShowNewBadge(next);
                      localStorage.setItem('tadasapo_showNewBadge', String(next));
                    }}
                    className={`p-1.5 rounded-lg text-[10px] font-black border flex items-center gap-1.5 transition-all ${
                      showNewBadge
                        ? 'bg-rose-50 text-rose-600 border-rose-200 hover:bg-rose-100'
                        : 'bg-slate-50 text-slate-400 border-slate-200 hover:bg-slate-100'
                    }`}
                  >
                    {showNewBadge ? <Bell size={13} /> : <BellOff size={13} />}
                  </button>
                </div>
              )}
            </div>
          </div>

          <main className="flex-1 flex overflow-hidden">
            {/* Sidebar */}
            <div className={`flex-none w-full md:w-[320px] lg:w-[380px] bg-white border-r border-slate-200 flex flex-col z-10 ${selectedCaseId ? 'hidden md:flex' : 'flex'}`}
              role="region" aria-label="案件一覧">
              {/* ステータスタブ + 詳細フィルタトグル + キーワード検索（常時表示） */}
              <div className="p-3 border-b border-slate-100 bg-slate-50/50 space-y-2">
                <div className="flex items-center gap-1">
                  <div className="flex gap-1 flex-1 overflow-x-auto" role="tablist" aria-label="ステータス切替">
                    {STATUS_KEYS.map(s => {
                      const tabCount = tabCounts[s] || 0;
                      const newCount = newCaseCounts[s] || 0;
                      return (
                        <button key={s} role="tab" aria-selected={activeTab === s} aria-controls="case-list-panel"
                          onClick={() => handleTabClick(s)}
                          className={`relative px-3 py-2 rounded-lg text-[10px] font-black whitespace-nowrap transition-all ${activeTab === s ? 'bg-white shadow-sm text-teal-700 ring-1 ring-slate-200' : 'text-slate-400 hover:text-slate-600'}`}>
                          {STATUS_LABELS[s]}
                          <span className="ml-1 opacity-50">({tabCount})</span>
                          {newCount > 0 && (
                            <span className="ml-1 inline-flex items-center justify-center px-1.5 py-0.5 bg-rose-500 text-white rounded-full text-[9px] font-black leading-none">
                              +{newCount}
                            </span>
                          )}
                        </button>
                      );
                    })}
                  </div>
                  {/* 詳細フィルタトグル（アクティブ数バッジ付き） */}
                  <button
                    onClick={() => setSearchOpen(!searchOpen)}
                    aria-expanded={searchOpen} aria-controls="search-panel" aria-label="詳細フィルタを開く"
                    className={`relative shrink-0 p-2 rounded-lg transition-all ${searchOpen || advancedFilterCount > 0 ? 'bg-teal-500 text-white shadow-sm' : 'text-slate-400 hover:text-slate-600 hover:bg-slate-100'}`}>
                    <Filter size={14} />
                    {advancedFilterCount > 0 && (
                      <span className="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 text-white rounded-full text-[9px] font-black flex items-center justify-center">
                        {advancedFilterCount}
                      </span>
                    )}
                  </button>
                </div>
                {/* キーワード検索（常時表示） */}
                <div className="relative">
                  <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" aria-hidden="true" />
                  <input
                    ref={searchInputRef} type="search" autoComplete="off"
                    value={searchWord} onChange={e => setSearchWord(e.target.value)}
                    placeholder="事業所名・担当者名・内容を検索..."
                    aria-label="キーワードで案件を検索"
                    className="w-full pl-9 pr-8 py-2 border-2 border-slate-100 rounded-xl text-xs font-bold outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all placeholder:text-slate-300 bg-white"
                  />
                  {searchWord && (
                    <button onClick={() => setSearchWord('')} aria-label="キーワードをクリア"
                      className="absolute right-2 top-1/2 -translate-y-1/2 p-0.5 rounded-full text-slate-300 hover:text-slate-500 transition-colors">
                      <XCircle size={14} />
                    </button>
                  )}
                </div>
              </div>
              {/* アクティブフィルターチップ（個別削除可能なピル表示） */}
              {activeChips.length > 0 && (
                <div className="px-3 py-1.5 bg-teal-50 border-b border-teal-100 flex flex-wrap gap-1 items-center">
                  {activeChips.map(chip => (
                    <span key={chip.id} className="inline-flex items-center gap-0.5 px-2 py-0.5 bg-white border border-teal-200 text-teal-800 rounded-full text-[10px] font-bold shadow-sm">
                      {chip.label}
                      <button onClick={chip.clear} aria-label={`${chip.label}をクリア`}
                        className="ml-0.5 hover:bg-teal-100 rounded-full p-0.5 transition-colors">
                        <X size={9} />
                      </button>
                    </span>
                  ))}
                  {activeChips.length > 1 && (
                    <button onClick={clearSearch} aria-label="検索条件をすべてクリア"
                      className="text-[10px] font-black text-slate-400 hover:text-rose-500 transition-colors ml-0.5">
                      すべてクリア
                    </button>
                  )}
                  <span className="ml-auto text-[10px] font-bold text-teal-600" role="status" aria-live="polite" aria-atomic="true">
                    {filteredCases.length} 件
                  </span>
                </div>
              )}
              {/* 詳細フィルタパネル */}
              {searchOpen && (
                <div id="search-panel" role="search" aria-label="案件絞り込み" className="border-b border-slate-200 bg-white animate-in fade-in duration-200">
                  <div className="p-3 space-y-3">
                    {/* 期間 + プリセットボタン */}
                    <fieldset>
                      <legend className="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1.5">
                        期間で絞り込み
                      </legend>
                      <div className="flex gap-1 flex-wrap mb-2">
                        {[
                          { label: '今月', preset: 'thisMonth' },
                          { label: '先月', preset: 'lastMonth' },
                          { label: '今年度', preset: 'thisFiscal' },
                          { label: '前年度', preset: 'lastFiscal' },
                        ].map(({ label, preset }) => {
                          const range = getDateRange(preset);
                          const isActive = searchDateFrom === range.from && searchDateTo === range.to;
                          return (
                            <button key={preset}
                              onClick={() => {
                                if (isActive) { setSearchDateFrom(''); setSearchDateTo(''); }
                                else { setSearchDateFrom(range.from); setSearchDateTo(range.to); }
                              }}
                              className={`px-2.5 py-1 rounded-lg text-[10px] font-bold border transition-all ${
                                isActive ? 'bg-teal-500 text-white border-teal-500 shadow-sm' : 'border-slate-200 text-slate-500 hover:border-teal-300 hover:text-teal-600 bg-white'
                              }`}>
                              {label}
                            </button>
                          );
                        })}
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="flex-1">
                          <label htmlFor="search-date-from" className="sr-only">開始日</label>
                          <input id="search-date-from" type="date" value={searchDateFrom}
                            onChange={e => setSearchDateFrom(e.target.value)}
                            aria-label="検索開始日"
                            className="w-full py-2 px-3 border-2 border-slate-100 rounded-xl text-xs font-bold outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all bg-white"
                          />
                        </div>
                        <span className="text-xs font-black text-slate-300 shrink-0" aria-hidden="true">〜</span>
                        <div className="flex-1">
                          <label htmlFor="search-date-to" className="sr-only">終了日</label>
                          <input id="search-date-to" type="date" value={searchDateTo}
                            onChange={e => setSearchDateTo(e.target.value)}
                            aria-label="検索終了日"
                            className="w-full py-2 px-3 border-2 border-slate-100 rounded-xl text-xs font-bold outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all bg-white"
                          />
                        </div>
                      </div>
                    </fieldset>
                    {/* 都道府県 + サービス種別 */}
                    <div className="grid grid-cols-2 gap-2">
                      <div className="relative">
                        <label className="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1">都道府県</label>
                        <input
                          type="text"
                          value={filterPrefOpen ? filterPrefWord : (searchPrefecture || '')}
                          placeholder="すべて"
                          onFocus={() => { setFilterPrefOpen(true); setFilterPrefWord(''); }}
                          onBlur={() => setTimeout(() => setFilterPrefOpen(false), 150)}
                          onChange={e => setFilterPrefWord(e.target.value)}
                          className="w-full py-2 px-3 border-2 border-slate-100 rounded-xl text-xs font-bold outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 transition-all bg-white"
                        />
                        {filterPrefOpen && (
                          <div className="absolute z-10 top-full mt-1 w-full bg-white border border-slate-200 rounded-xl shadow-lg max-h-48 overflow-y-auto">
                            <button
                              type="button"
                              onMouseDown={() => { setSearchPrefecture(''); setFilterPrefOpen(false); }}
                              className="w-full text-left px-3 py-2 text-xs text-slate-400 font-bold hover:bg-slate-50"
                            >すべて</button>
                            {(masters?.prefectures || [])
                              .filter(p => !filterPrefWord.trim() || p.includes(filterPrefWord.trim()))
                              .map(p => (
                                <button
                                  key={p}
                                  type="button"
                                  onMouseDown={() => { setSearchPrefecture(p); setFilterPrefOpen(false); }}
                                  className={`w-full text-left px-3 py-2 text-xs font-bold hover:bg-teal-50 hover:text-teal-700 ${searchPrefecture === p ? 'bg-teal-50 text-teal-700' : 'text-slate-700'}`}
                                >{p}</button>
                              ))
                            }
                          </div>
                        )}
                      </div>
                      <div>
                        <label className="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1">サービス種別</label>
                        <select
                          value={searchServiceType}
                          onChange={e => setSearchServiceType(e.target.value)}

                  </div>

    // ======================================================================
    // テキスト内URLをリンクに変換するヘルパー
    // ======================================================================
    function linkifyText(text) {
      if (!text) return null;
      const parts = text.split(/(https?:\/\/[^\s]+)/g);
      return parts.map((part, i) =>
        part.match(/^https?:\/\//)
          ? <a key={i} href={part} target="_blank" rel="noopener noreferrer" className="text-sky-600 hover:underline break-all">{part}</a>
          : part
      );
    }

    // ======================================================================
    // 新規案件追加ダイアログ（管理モード専用）
    // ======================================================================
    function AddCaseDialog({ masters, onClose, onAdded, showToast }) {
      const PREFECTURES = masters?.prefectures || [];
      const SERVICE_TYPES = masters?.businessTypes || [];
      const [form, setForm] = useState({ email: '', officeName: '', requesterName: '', details: '', prefecture: '', serviceType: '' });
      const [submitting, setSubmitting] = useState(false);

      const set = (key, val) => setForm(prev => ({ ...prev, [key]: val }));

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.email.trim())         return showToast('メールアドレスを入力してください。', { type: 'error' });
        if (!form.officeName.trim())    return showToast('介護事業所名を入力してください。', { type: 'error' });
        if (!form.requesterName.trim()) return showToast('お名前を入力してください。', { type: 'error' });
        if (!form.details.trim())       return showToast('困りごと詳細を入力してください。', { type: 'error' });
        setSubmitting(true);
        try {
          var addPayload = {
            email: form.email.trim(),
            officeName: form.officeName.trim(),
            requesterName: form.requesterName.trim(),
            details: form.details.trim(),
            prefecture: form.prefecture || '',
            serviceType: form.serviceType || ''
          };
          const result = await Api.addManualCase(addPayload);
          onAdded(result.pk, addPayload);
        } catch (e) {
          showToast(e.message || String(e), { type: 'error', title: '案件追加エラー' });
        } finally {
          setSubmitting(false);
        }
      };

      const inputCls = 'w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400';
      const labelCls = 'block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-1';

      return (
        <div className="fixed inset-0 z-[120] bg-slate-900/60 backdrop-blur-sm p-4 flex items-center justify-center">
          <div className="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden">
            <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
              <div>
                <h3 className="text-sm font-black text-slate-800 flex items-center gap-2"><Plus size={16}/> 新規案件追加</h3>
                <p className="text-[10px] text-slate-500 mt-0.5">管理者による手動登録。「案件手動追加」シートに保存されます。</p>
              </div>
              <button onClick={onClose} className="p-2 rounded-lg hover:bg-slate-100"><X size={16}/></button>
            </div>
            <form onSubmit={handleSubmit} className="px-6 py-5 space-y-4 overflow-y-auto max-h-[70vh]">
              <div>
                <label className={labelCls}>メールアドレス <span className="text-rose-500">*</span></label>
                <input type="email" className={inputCls} value={form.email} onChange={e => set('email', e.target.value)} placeholder="example@kaigo.jp" />
              </div>
              <div>
                <label className={labelCls}>介護事業所名 <span className="text-rose-500">*</span></label>
                <input type="text" className={inputCls} value={form.officeName} onChange={e => set('officeName', e.target.value)} placeholder="〇〇訪問介護ステーション" />
              </div>
              <div>
                <label className={labelCls}>お名前 <span className="text-rose-500">*</span></label>
                <input type="text" className={inputCls} value={form.requesterName} onChange={e => set('requesterName', e.target.value)} placeholder="山田 太郎" />
              </div>
              <div className="flex gap-3">
                <div className="flex-1">
                  <label className={labelCls}>都道府県</label>
                  <select className={inputCls} value={form.prefecture} onChange={e => set('prefecture', e.target.value)}>
                    <option value="">未選択</option>
                    {PREFECTURES.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
                <div className="flex-1">
                  <label className={labelCls}>サービス種別</label>
                  <select className={inputCls} value={form.serviceType} onChange={e => set('serviceType', e.target.value)}>
                    <option value="">未選択</option>
                    {SERVICE_TYPES.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                </div>
              </div>
              <div>
                <label className={labelCls}>困りごと詳細 <span className="text-rose-500">*</span></label>
                <textarea className={inputCls + ' resize-none'} rows={4} value={form.details} onChange={e => set('details', e.target.value)} placeholder="相談内容を入力してください。" />
              </div>
              <button type="submit" disabled={submitting} className="relative w-full py-3.5 bg-teal-600 hover:bg-teal-700 text-white rounded-xl font-black text-sm transition-all">
                <span className={submitting ? 'invisible' : ''}>案件を追加する</span>
                {submitting && <Loader2 size={18} className="animate-spin absolute inset-0 m-auto"/>}
              </button>
            </form>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
